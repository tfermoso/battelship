<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Colocación de barcos</title>
    <meta http-equiv="refresh" content="8" th:if="${board.ready}">    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background: #f5f6fa; }
        .container { max-width: 1000px; margin: auto; }
        .card { background: white; padding: 24px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.08); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .field { margin-bottom: 12px; }
        label { display: block; font-weight: bold; margin-bottom: 4px; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; }
        .error { background: #f8d7da; color: #842029; padding: 10px; border-radius: 6px; margin-bottom: 15px; }
        .ok { color: green; font-weight: bold; }
        .waiting { color: #b26a00; font-weight: bold; }
        button { padding: 10px 16px; border: none; border-radius: 6px; background: #0d6efd; color: white; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">

    <div class="card">
        <h1>Preparación de la partida</h1>
        <p><strong>Partida:</strong> <span th:text="${game.name}"></span></p>
        <p><strong>Código:</strong> <span th:text="${game.code}"></span></p>
        <p><strong>Estado:</strong> <span th:text="${game.status}"></span></p>
    </div>

    <div class="card">
        <h2>Estado de los jugadores</h2>
        <div th:each="b : ${boards}">
            <p>
                <strong th:text="${b.player.name}"></strong>:
                <span th:if="${b.ready}" class="ok">Listo</span>
                <span th:unless="${b.ready}" class="waiting">Pendiente de colocar barcos</span>
            </p>
        </div>
    </div>

    <div class="card">
        <h2>Colocar flota</h2>

        <div th:if="${error}" class="error" th:text="${error}"></div>

        <form th:action="@{/games/{gameId}/setup(gameId=${game.id})}" th:object="${placementDto}" method="post">
            <div class="grid">

                <div>
                    <h3>Barco grande (4)</h3>
                    <div class="field">
                        <label>Fila</label>
                        <input type="number" th:field="*{largeRow}" min="0" max="9">
                    </div>
                    <div class="field">
                        <label>Columna</label>
                        <input type="number" th:field="*{largeCol}" min="0" max="9">
                    </div>
                    <div class="field">
                        <label>Orientación</label>
                        <select th:field="*{largeOrientation}">
                            <option value="HORIZONTAL">Horizontal</option>
                            <option value="VERTICAL">Vertical</option>
                        </select>
                    </div>

                    <h3>Barco mediano 1 (2)</h3>
                    <div class="field">
                        <label>Fila</label>
                        <input type="number" th:field="*{medium1Row}" min="0" max="9">
                    </div>
                    <div class="field">
                        <label>Columna</label>
                        <input type="number" th:field="*{medium1Col}" min="0" max="9">
                    </div>
                    <div class="field">
                        <label>Orientación</label>
                        <select th:field="*{medium1Orientation}">
                            <option value="HORIZONTAL">Horizontal</option>
                            <option value="VERTICAL">Vertical</option>
                        </select>
                    </div>

                    <h3>Barco mediano 2 (2)</h3>
                    <div class="field">
                        <label>Fila</label>
                        <input type="number" th:field="*{medium2Row}" min="0" max="9">
                    </div>
                    <div class="field">
                        <label>Columna</label>
                        <input type="number" th:field="*{medium2Col}" min="0" max="9">
                    </div>
                    <div class="field">
                        <label>Orientación</label>
                        <select th:field="*{medium2Orientation}">
                            <option value="HORIZONTAL">Horizontal</option>
                            <option value="VERTICAL">Vertical</option>
                        </select>
                    </div>
                </div>

                <div>
                    <h3>Barco pequeño 1 (1)</h3>
                    <div class="field">
                        <label>Fila</label>
                        <input type="number" th:field="*{small1Row}" min="0" max="9">
                    </div>
                    <div class="field">
                        <label>Columna</label>
                        <input type="number" th:field="*{small1Col}" min="0" max="9">
                    </div>

                    <h3>Barco pequeño 2 (1)</h3>
                    <div class="field">
                        <label>Fila</label>
                        <input type="number" th:field="*{small2Row}" min="0" max="9">
                    </div>
                    <div class="field">
                        <label>Columna</label>
                        <input type="number" th:field="*{small2Col}" min="0" max="9">
                    </div>

                    <h3>Barco pequeño 3 (1)</h3>
                    <div class="field">
                        <label>Fila</label>
                        <input type="number" th:field="*{small3Row}" min="0" max="9">
                    </div>
                    <div class="field">
                        <label>Columna</label>
                        <input type="number" th:field="*{small3Col}" min="0" max="9">
                    </div>
                </div>

            </div>

            <button type="submit">Guardar colocación</button>
        </form>
    </div>

</div>
</body>
</html>
