<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Crear partida</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 30px; background: #f5f6fa; }
    .card { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .field { margin-bottom: 15px; }
    label { display: block; margin-bottom: 6px; }
    input { width: 100%; padding: 10px; box-sizing: border-box; }
    .error { color: #c62828; font-size: 14px; margin-top: 4px; }
    .btn { padding: 10px 14px; border: none; border-radius: 6px; cursor: pointer; }
    .btn-primary { background: #0d6efd; color: white; }
  </style>
</head>
<body>

<div class="card">
  <h1>Crear partida</h1>

  <form th:action="@{/games/create}" th:object="${createGameDto}" method="post">
    <div class="field">
      <label for="name">Nombre de la partida</label>
      <input type="text" id="name" th:field="*{name}">
      <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
    </div>

    <button type="submit" class="btn btn-primary">Crear partida</button>
  </form>
</div>

</body>
</html>
