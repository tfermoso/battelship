<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Jugar partida</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .boards {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
        }

        .board-container {
            min-width: 320px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(10, 32px);
            gap: 2px;
            margin-top: 10px;
        }

        .cell {
            width: 32px;
            height: 32px;
            border: 1px solid #999;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
        }

        .water {
            background: #e7f3ff;
            color: #2b4c7e;
        }

        .ship {
            background: #9ca3af;
            color: #111827;
        }

        .hit {
            background: #f59e0b;
            color: white;
        }

        .sunk {
            background: #111111;
            color: white;
        }

        .miss {
            background: #ffffff;
            color: #6b7280;
        }

        .unknown {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .enemy-btn {
            width: 32px;
            height: 32px;
            border: 1px solid #999;
            cursor: pointer;
            background: #dbeafe;
            font-weight: bold;
        }

        .enemy-btn:hover {
            background: #bfdbfe;
        }

        .enemy-btn:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        .msg-ok {
            color: green;
            font-weight: bold;
        }

        .msg-error {
            color: red;
            font-weight: bold;
        }

        .msg-info {
            background: #eef6ff;
            border: 1px solid #99c2ff;
            padding: 10px;
            margin: 15px 0;
            font-weight: bold;
        }

        .legend span {
            margin-right: 14px;
        }
    </style>
</head>
<body>

<h1 th:text="'Partida: ' + ${game.name}"></h1>

<p><strong>Estado:</strong> <span th:text="${game.status}"></span></p>
<p><strong>Rival:</strong> <span th:text="${opponent.name}"></span></p>

<p th:if="${winner != null}">
    <strong>Ganador:</strong> <span th:text="${winner.name}"></span>
</p>

<p th:if="${winner == null}">
    <strong>Turno:</strong>
    <span th:text="${isMyTurn} ? 'Te toca a ti' : 'Turno del rival'"></span>
</p>

<p class="msg-ok" th:if="${success}" th:text="${success}"></p>
<p class="msg-error" th:if="${error}" th:text="${error}"></p>

<div id="ws-message" class="msg-info" style="display:none;"></div>

<div class="boards">

    <div class="board-container">
        <h2>Tu tablero</h2>
        <div class="board">
            <th:block th:each="row : ${myBoard}">
                <th:block th:each="cell : ${row}">
                    <div class="cell"
                         th:classappend="
                            ${cell == 'W'} ? 'water' :
                            (${cell == 'S'} ? 'ship' :
                            (${cell == 'H'} ? 'hit' :
                            (${cell == 'X'} ? 'sunk' :
                            (${cell == 'M'} ? 'miss' : 'unknown'))))">
                        <span th:text="${cell}"></span>
                    </div>
                </th:block>
            </th:block>
        </div>
    </div>

    <div class="board-container">
        <h2>Tablero enemigo</h2>
        <div class="board">
            <th:block th:each="row, rowStat : ${enemyBoard}">
                <th:block th:each="cell, colStat : ${row}">

                    <form th:if="${cell == '?' and isMyTurn and winner == null}"
                          th:action="@{/games/{id}/play/shoot(id=${game.id})}"
                          method="post"
                          style="margin:0;">
                        <input type="hidden" name="x" th:value="${rowStat.index}">
                        <input type="hidden" name="y" th:value="${colStat.index}">
                        <button type="submit" class="enemy-btn">?</button>
                    </form>

                    <div th:if="${!(cell == '?' and isMyTurn and winner == null)}"
                         class="cell"
                         th:classappend="
                            ${cell == '?'} ? 'unknown' :
                            (${cell == 'H'} ? 'hit' :
                            (${cell == 'X'} ? 'sunk' :
                            (${cell == 'M'} ? 'miss' : 'unknown')))">
                        <span th:text="${cell}"></span>
                    </div>

                </th:block>
            </th:block>
        </div>
    </div>

</div>

<div class="legend" style="margin-top: 20px;">
    <strong>Leyenda:</strong>
    <span>S = barco</span>
    <span>H = tocado</span>
    <span>X = hundido</span>
    <span>M = agua</span>
</div>

<p style="margin-top: 20px;">
    <a th:href="@{/games}">Volver al listado</a>
</p>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script th:inline="javascript">
    const gameId = [[${game.id}]];
    const currentUserId = [[${currentUser.id}]];
    const winnerId = [[${winner != null ? winner.id : null}]];

    let stompClient = null;

    function showRealtimeMessage(text) {
        const box = document.getElementById('ws-message');
        box.textContent = text;
        box.style.display = 'block';
    }

    function connectWebSocket() {
        const socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function () {
            console.log('WebSocket conectado');

            stompClient.subscribe('/topic/game/' + gameId, function (message) {
                const data = JSON.parse(message.body);
                console.log('Evento recibido:', data);

                if (data.type === 'PLAYER_READY') {
                    showRealtimeMessage(data.content || (data.playerName + ' ya está listo'));
                    return;
                }

                if (data.type === 'GAME_START') {
                    showRealtimeMessage(data.content || 'La partida comienza');
                    setTimeout(() => window.location.reload(), 700);
                    return;
                }

                if (data.type === 'SHOT') {
                    let text = data.content || 'Movimiento actualizado';

                    if (data.result === 'WATER') {
                        text = data.playerName + ' ha disparado: agua';
                    } else if (data.result === 'HIT') {
                        text = data.playerName + ' ha disparado: tocado';
                    } else if (data.result === 'SUNK') {
                        text = data.playerName + ' ha disparado: ¡hundido!';
                    }

                    showRealtimeMessage(text);
                    setTimeout(() => window.location.reload(), 700);
                }
            });
        }, function (error) {
            console.error('Error WebSocket:', error);
        });
    }

    connectWebSocket();
</script>

</body>
</html>
